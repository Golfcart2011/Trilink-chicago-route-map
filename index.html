<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Airline Route Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {margin:0;padding:0;}
#map {height:100vh;width:100%;}

.legend{
background:white;
padding:10px;
font-family:Arial;
font-size:13px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.25);
}

.legend i{
width:18px;
height:3px;
float:left;
margin-right:8px;
margin-top:7px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Great circle route library -->
<script src="https://unpkg.com/leaflet-arc/bin/leaflet.arc.min.js"></script>

<script>

/* =====================
MAP
===================== */

const map = L.map("map").setView([35,-20],2);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
attribution:"© OpenStreetMap"
}).addTo(map);


/* =====================
AIRPORTS
===================== */

const airports={

PDX:{name:"Portland",coords:[45.5898,-122.5951],pnw:true},

ATL:{name:"Atlanta",coords:[33.6407,-84.4277],pnw:true},
ORD:{name:"Chicago O'Hare",coords:[41.9742,-87.9073],pnw:true},
DFW:{name:"Dallas Fort Worth",coords:[32.8998,-97.0403],pnw:true},
IAH:{name:"Houston",coords:[29.9902,-95.3368],pnw:true},
LAX:{name:"Los Angeles",coords:[33.9416,-118.4085],pnw:true},
MIA:{name:"Miami",coords:[25.7959,-80.2871],pnw:true},
JFK:{name:"New York JFK",coords:[40.6413,-73.7781],pnw:true},
SMF:{name:"Sacramento",coords:[38.6954,-121.5908],pnw:true},
SFO:{name:"San Francisco",coords:[37.6213,-122.3790],pnw:true},
SEA:{name:"Seattle Tacoma",coords:[47.4502,-122.3088],pnw:true},
DCA:{name:"Washington Reagan",coords:[38.8512,-77.0402],pnw:true},

AMS:{name:"Amsterdam",coords:[52.3105,4.7683],pnw:true},
DUB:{name:"Dublin",coords:[53.4264,-6.2499],pnw:true},
TLV:{name:"Tel Aviv",coords:[32.0114,34.8867],pnw:true},
ICN:{name:"Seoul Incheon",coords:[37.4602,126.4407],pnw:true},
PVG:{name:"Shanghai Pudong",coords:[31.1443,121.8083],pnw:true},
FRA:{name:"Frankfurt",coords:[50.0379,8.5622],pnw:true},
SGN:{name:"Ho Chi Minh City",coords:[10.8188,106.6519],pnw:true},
LHR:{name:"London Heathrow",coords:[51.4700,-0.4543],pnw:true},
TPE:{name:"Taipei",coords:[25.0797,121.2342],pnw:true},
HND:{name:"Tokyo Haneda",coords:[35.5494,139.7798],pnw:true},

/* Lyon network */

LYS:{name:"Lyon",coords:[45.7256,5.0811],lyon:true},
BOD:{name:"Bordeaux",coords:[44.8283,-0.7156],lyon:true},
NTE:{name:"Nantes",coords:[47.1532,-1.6107],lyon:true},
PRG:{name:"Prague",coords:[50.1008,14.2632],lyon:true},
MXP:{name:"Milan",coords:[45.6306,8.7281],lyon:true},
LCY:{name:"London City",coords:[51.5053,0.0553],lyon:true}

};


/* =====================
ROUTE LAYERS
===================== */

const pnwRoutes=L.layerGroup();
const lyonRoutes=L.layerGroup();

const pnwColor="#1f7a3f";
const lyonColor="#ff7f00";


/* function for curved route */

function drawArc(a,b,color,layer){

const start={
x:airports[a].coords[1],
y:airports[a].coords[0]
};

const end={
x:airports[b].coords[1],
y:airports[b].coords[0]
};

const arc = new L.Polyline.Arc(start,end,{
color:color,
weight:2.7,
opacity:0.85
});

arc.addTo(layer);

}


/* =====================
PACIFIC NORTHWEST AIRLINES
===================== */

[
"ATL","ORD","DFW","IAH","LAX","MIA","JFK",
"SMF","SFO","SEA","DCA",
"AMS","ICN","PVG","FRA","SGN","LHR","TPE","HND"
].forEach(dest=>{
drawArc("PDX",dest,pnwColor,pnwRoutes);
});


/* multi leg */

drawArc("PDX","DUB",pnwColor,pnwRoutes);
drawArc("DUB","TLV",pnwColor,pnwRoutes);


/* =====================
LYON AIR
===================== */

["BOD","NTE","PRG","MXP","LCY"].forEach(dest=>{
drawArc("LYS",dest,lyonColor,lyonRoutes);
});


pnwRoutes.addTo(map);
lyonRoutes.addTo(map);


/* =====================
MARKERS
===================== */

const markers={};

Object.keys(airports).forEach(code=>{
markers[code]=L.marker(airports[code].coords)
.bindPopup(`<b>${airports[code].name}</b>`);
});


function updateAirports(){

Object.keys(airports).forEach(code=>{

const a=airports[code];

const show=
(a.pnw && map.hasLayer(pnwRoutes)) ||
(a.lyon && map.hasLayer(lyonRoutes));

if(show && !map.hasLayer(markers[code]))
markers[code].addTo(map);

if(!show && map.hasLayer(markers[code]))
map.removeLayer(markers[code]);

});

}

updateAirports();


/* =====================
FILTER
===================== */

L.control.layers(null,{
"Pacific Northwest Airlines":pnwRoutes,
"Lyon Air":lyonRoutes
},{collapsed:false}).addTo(map);

map.on("overlayadd overlayremove",updateAirports);


/* =====================
LEGEND
===================== */

const legend=L.control({position:"bottomright"});

legend.onAdd=function(){

const div=L.DomUtil.create("div","legend");

div.innerHTML=`
<b>Route Legend</b><br>
<i style="background:${pnwColor}"></i> Pacific Northwest Airlines<br>
<i style="background:${lyonColor}"></i> Lyon Air
`;

return div;
};

legend.addTo(map);

</script>

</body>
</html>
